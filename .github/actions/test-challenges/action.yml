name: Test challenges
description: Test challenges.
inputs:
  challenges:
    description: Top-level challenge group.
    required: true
  modified_since_ref:
    description: Base ref challenges have been modified since.
    required: false
    default: ""
  gpg_private_key:
    description: GPG private key used to unlock git-crypt.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      if: ${{ inputs.modified_since_ref != '' }}
      with:
        fetch-depth: 0

    - name: Manage encrypted files
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg_private_key }}
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
      run: |
        if [ -n "$GPG_PRIVATE_KEY" ]; then
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          git crypt unlock
        else
          git crypt status -e \
            | sed -n 's/^[[:space:]]*encrypted:[[:space:]]*//p' \
            | sort -u \
            | xargs -r rm -f
        fi

    - name: Validate dojo.yml
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
      run: |
        if [ -f "$CHALLENGES_DIR/dojo.yml" ]; then
          echo "::group::Validating dojo.yml"
          ./tools/dojo/parse-dojo-yml "$CHALLENGES_DIR/dojo.yml"
          echo "::endgroup::"
        fi

    - name: Test challenges
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
        MODIFIED_SINCE: ${{ inputs.modified_since_ref }}
        PWNSHOP_VERBOSE_DOCKER_BUILD: "1"
      run: |
        run_with_heartbeat() {
          local label="$1"
          shift
          local log_file
          log_file="$(mktemp)"

          echo "${label}: started at $(date -Ins)"
          (
            "$@" 2>&1 | tee -a "$log_file"
          ) &
          local cmd_pid=$!

          (
            while kill -0 "$cmd_pid" 2>/dev/null; do
              sleep 15
              if ! kill -0 "$cmd_pid" 2>/dev/null; then
                break
              fi
              echo "::group::${label} heartbeat $(date -Ins)"
              echo "recent ${label} output:"
              tail -n 80 "$log_file" || true
              ps -eo pid,ppid,stat,etime,pcpu,pmem,args \
                | grep -E 'pwnshop|docker( |$)|pytest|python .*pwnshop' \
                | grep -v grep || true
              docker ps --format 'table {{.ID}}\t{{.Status}}\t{{.Image}}\t{{.Names}}' || true
              echo "::endgroup::"
            done
          ) &
          local heartbeat_pid=$!

          local status=0
          wait "$cmd_pid" || status=$?
          kill "$heartbeat_pid" 2>/dev/null || true
          wait "$heartbeat_pid" 2>/dev/null || true
          echo "${label}: finished at $(date -Ins) (status=${status})"
          rm -f "$log_file"
          return "$status"
        }

        echo "::group::Challenges to be tested"
        echo "listing challenges at $(date -Ins)"
        ./pwnshop list "$CHALLENGES_DIR" --modified-since="$MODIFIED_SINCE"
        echo "finished listing challenges at $(date -Ins)"
        echo "::endgroup::"

        echo "::group::Testing challenges"
        status=0
        echo "testing challenges from $CHALLENGES_DIR at $(date -Ins)"
        run_with_heartbeat "pwnshop test" \
          stdbuf -oL -eL \
          timeout --signal=TERM --kill-after=30s 900s ./pwnshop -vv test \
            --modified-since="$MODIFIED_SINCE" \
            --jobs "$(( $(nproc) * 2 ))" \
            --attempts 5 \
            --timeout 600 \
            --silent-failures \
            "$CHALLENGES_DIR" || status=$?
        if [ "$status" -eq 124 ]; then
          echo "pwnshop test timed out after 900s" >&2
        fi
        echo "::endgroup::"
        exit "$status"
