name: Test challenges
description: Test challenges.
inputs:
  challenges:
    description: Top-level challenge group.
    required: true
  modified_since_ref:
    description: Base ref challenges have been modified since.
    required: false
    default: ""
  gpg_private_key:
    description: GPG private key used to unlock git-crypt.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      if: ${{ inputs.modified_since_ref != '' }}
      with:
        fetch-depth: 0

    - name: Manage encrypted files
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg_private_key }}
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
      run: |
        if [ -n "$GPG_PRIVATE_KEY" ]; then
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          git crypt unlock
        else
          git crypt status -e \
            | sed -n 's/^[[:space:]]*encrypted:[[:space:]]*//p' \
            | sort -u \
            | xargs -r rm -f
        fi

    - name: Validate dojo.yml
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
      run: |
        if [ -f "$CHALLENGES_DIR/dojo.yml" ]; then
          echo "::group::Validating dojo.yml"
          ./tools/dojo/parse-dojo-yml "$CHALLENGES_DIR/dojo.yml"
          echo "::endgroup::"
        fi

    - name: Preflight diagnostics
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
        MODIFIED_SINCE: ${{ inputs.modified_since_ref }}
      run: |
        chmod +x .github/actions/test-challenges/with-heartbeat.sh
        echo "::group::Preflight"
        date -Ins
        uname -a
        nproc
        free -h
        df -h
        ulimit -a
        env | sort
        docker version
        docker info
        echo "::endgroup::"

        echo "::group::Challenges to be tested"
        echo "listing challenges at $(date -Ins)"
        ./pwnshop list "$CHALLENGES_DIR" --modified-since="$MODIFIED_SINCE"
        echo "finished listing challenges at $(date -Ins)"
        echo "::endgroup::"

    - name: Build challenges (diagnostic)
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
        MODIFIED_SINCE: ${{ inputs.modified_since_ref }}
        PWNSHOP_VERBOSE_DOCKER_BUILD: "1"
      run: |
        chmod +x .github/actions/test-challenges/with-heartbeat.sh
        ./.github/actions/test-challenges/with-heartbeat.sh "pwnshop build" \
          timeout --signal=TERM --kill-after=30s 1200s ./pwnshop -vv build \
            --modified-since="$MODIFIED_SINCE" \
            "$CHALLENGES_DIR"

    - name: Smoke start challenges (diagnostic)
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
        MODIFIED_SINCE: ${{ inputs.modified_since_ref }}
        PWNSHOP_VERBOSE_DOCKER_BUILD: "1"
      run: |
        chmod +x .github/actions/test-challenges/with-heartbeat.sh
        mapfile -t challenges < <(./pwnshop list "$CHALLENGES_DIR" --modified-since="$MODIFIED_SINCE")
        printf 'smoke targets:\n%s\n' "${challenges[@]}"
        ./.github/actions/test-challenges/with-heartbeat.sh "smoke run_challenge" \
          timeout --signal=TERM --kill-after=30s 300s bash -euo pipefail -c '
            for challenge in "$@"; do
              label="${challenge#challenges/}"
              image_id="$(docker images --quiet --filter "label=pwncollege.challenge=${label}" | head -n1)"
              echo "smoke-start ${challenge}"
              echo "smoke-image ${challenge} ${image_id}"
              if [ -z "$image_id" ]; then
                echo "missing image for ${challenge}" >&2
                exit 1
              fi

              container="$(
                docker run \
                  --rm \
                  --interactive \
                  --detach \
                  --init \
                  --user=0:0 \
                  --runtime=runc \
                  --device=/dev/kvm \
                  --device=/dev/net/tun \
                  --cap-add=SYS_PTRACE \
                  --sysctl=net.ipv4.ip_unprivileged_port_start=1024 \
                  --env FLAG=pwn.college{diagnostic} \
                  --env SEED=0 \
                  --env PATH=/challenge/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
                  "$image_id" \
                  /bin/sh -c "read forever"
              )"
              echo "smoke-container-id ${challenge} ${container}"
              docker exec --interactive --user=0:0 "$container" /bin/sh -c \
                "cat >/flag && chown 0:0 /flag && chmod 0400 /flag" <<EOF
pwn.college{diagnostic}
EOF
              docker exec --user=0:0 "$container" /bin/sh -c \
                "[ ! -e /challenge/.init ] || /challenge/.init"
              echo "smoke-container-up ${challenge}"
              sleep 5
              docker kill "$container" >/dev/null 2>&1 || true
              echo "smoke-container-down ${challenge}"
            done
          ' bash "${challenges[@]}"

    - name: Test challenges
      shell: 'nix develop -c bash -euo pipefail {0}'
      env:
        CHALLENGES_DIR: challenges/${{ inputs.challenges }}
        MODIFIED_SINCE: ${{ inputs.modified_since_ref }}
        PWNSHOP_VERBOSE_DOCKER_BUILD: "1"
      run: |
        chmod +x .github/actions/test-challenges/with-heartbeat.sh
        status=0
        ./.github/actions/test-challenges/with-heartbeat.sh "pwnshop test" \
          timeout --signal=TERM --kill-after=30s 900s ./pwnshop -vv test \
            --modified-since="$MODIFIED_SINCE" \
            --jobs "$(( $(nproc) * 2 ))" \
            --attempts 5 \
            --timeout 600 \
            --silent-failures \
            "$CHALLENGES_DIR" || status=$?
        if [ "$status" -eq 124 ]; then
          echo "pwnshop test timed out after 900s" >&2
        fi
        exit "$status"
