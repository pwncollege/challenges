name: Determine modified challenges
description: Determine modified challenges, apply an optional glob filter, and group them for downstream jobs.
inputs:
  challenge_filter:
    description: Challenge path glob under challenges/.
    required: false
    default: "**"
outputs:
  modified_since_ref:
    description: Base ref challenges have been modified since.
    value: ${{ steps.resolve-ref.outputs.ref }}
  challenges:
    description: Filtered top-level challenge groups.
    value: ${{ steps.resolve-challenges.outputs.challenges }}
runs:
  using: composite
  steps:
    - uses: actions/github-script@v8
      id: resolve-ref
      with:
        script: |
          let ref = "";
          if (context.eventName === "pull_request") {
            ref = context.payload.pull_request.base.sha;
          } else if (context.eventName === "push") {
            const workflowFile = process.env.GITHUB_WORKFLOW_REF.split("@")[0].split("/").pop();
            const branch = context.ref.replace("refs/heads/", "");
            const { owner, repo } = context.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowFile,
              branch,
              status: "success",
              per_page: 1,
            });
            const [latest] = runs.data.workflow_runs;
            ref = latest ? latest.head_sha : "";
          }
          core.setOutput("ref", ref);

    - uses: actions/checkout@v6
      if: ${{ steps.resolve-ref.outputs.ref != '' }}
      with:
        fetch-depth: 0

    - uses: ./.github/actions/setup-nix

    - name: List modified challenges
      id: list-challenges
      shell: 'nix shell nixpkgs#uv nixpkgs#git --command bash --noprofile --norc -euo pipefail {0}'
      env:
        MODIFIED_SINCE: ${{ steps.resolve-ref.outputs.ref }}
      run: |
        challenges_file="$RUNNER_TEMP/modified-challenges.txt"
        ./pwnshop list ./challenges --modified-since="$MODIFIED_SINCE" > "$challenges_file"
        echo "challenges_file=$challenges_file" >> "$GITHUB_OUTPUT"

    - uses: actions/github-script@v8
      id: resolve-challenges
      env:
        CHALLENGE_FILTER: ${{ inputs.challenge_filter }}
        CHALLENGES_FILE: ${{ steps.list-challenges.outputs.challenges_file }}
      with:
        script: |
          const fs = require("fs");
          const path = require("path");
          const challengeFilter = process.env.CHALLENGE_FILTER.trim() || "**";
          const output = fs.readFileSync(process.env.CHALLENGES_FILE, "utf8").trim();
          const listedChallenges = output.split("\n").map((line) => line.trim()).filter(Boolean);
          const groupChallenge = (challenge) => {
            const parts = challenge.split("/");
            if (parts[0] === "legacy") return `legacy/${parts[1]}`;
            return parts[0];
          };
          const challenges = Array.from(
            new Set(
              listedChallenges
                .filter((challenge) => path.matchesGlob(challenge, challengeFilter))
                .map(groupChallenge),
            ),
          ).sort();
          core.setOutput("challenges", JSON.stringify(challenges));
