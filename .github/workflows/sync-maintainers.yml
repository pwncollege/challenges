name: Sync Maintainers

on:
  push:
    branches: [ main ]
    paths:
      - "maintainers.yml"
      - "tools/maintainers/sync-maintainers"
      - ".github/workflows/sync-maintainers.yml"
      - ".git-crypt/keys/**/A6C1BD8AA19BE7CC1B05DD6E1E180F029DD5460F.gpg"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-maintainers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Unlock git-crypt
        shell: 'nix shell nixpkgs#git nixpkgs#git-crypt nixpkgs#gnupg --command bash --noprofile --norc -euo pipefail {0}'
        env:
          GPG_ROOT_PRIVATE_KEY: ${{ secrets.GPG_ROOT_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_ROOT_PRIVATE_KEY" ]; then
            echo "Error: GPG_ROOT_PRIVATE_KEY is not set."
            exit 1
          fi
          printf '%s' "$GPG_ROOT_PRIVATE_KEY" | gpg --batch --import
          git crypt unlock

      - name: Sync maintainers
        shell: 'nix shell nixpkgs#uv nixpkgs#git nixpkgs#git-crypt nixpkgs#gnupg --command bash --noprofile --norc -euo pipefail {0}'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          ./tools/maintainers/sync-maintainers | tee /tmp/sync-maintainers.log

          if ! git diff --cached --quiet; then
            {
              echo "maintainers: synchronized"
              echo
              cat /tmp/sync-maintainers.log
            } | git commit -F -
            git push
          else
            echo "No changes to commit."
          fi
